name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install
        # Full extras: the offline suite imports the agents (ADK), gateway
        # (FastAPI) and MCP packages — it just never makes a network/LLM call
        # (conftest mocks google.auth).
        run: python -m pip install -e ".[all,dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test (offline)
        # The suite mocks google.auth in conftest.py, so no credentials or
        # network are needed.
        run: python -m pytest

      - name: Discrimination eval (smoke)
        run: python -m eval.discrimination

      - name: Discrimination eval (full corpus)
        run: make eval-discrimination-full

      - name: Holdout eval
        run: make eval-holdout

      - name: Latency eval
        run: make eval-latency

  web:
    # Catch a broken frontend before it can be merged/deployed.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker:
    # Each deployed service has its own Docker target. Build them in CI so main
    # cannot deploy a platform service that only worked in local Python tests.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: gateway
            image: egress-gateway
          - target: engine
            image: egress-engine
          - target: market_data_mcp
            image: egress-market-data-mcp
          - target: news_mcp
            image: egress-news-mcp
          - target: positioning_mcp
            image: egress-positioning-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target }}
        run: docker build --target ${{ matrix.target }} -t ${{ matrix.image }} .
