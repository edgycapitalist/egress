# Local development topology. Mirrors the cloud data layer (Cloud SQL Postgres +
# pgvector, Memorystore Redis) so the system runs on a laptop against the
# deterministic baseline with no cloud cost.
#
# The active local compose path brings up the data layer only. Application
# service stanzas are sketched at the bottom as optional local topology examples;
# use the Makefile targets for the normal developer loop.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: egress
      POSTGRES_PASSWORD: egress
      POSTGRES_DB: egress
    ports:
      - "5432:5432"
    volumes:
      - egress_pgdata:/var/lib/postgresql/data
      # Enables the `vector` extension on first start.
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egress -d egress"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  egress_pgdata:

